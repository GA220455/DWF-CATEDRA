<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Cliente</title>
    <style>
        body {
               font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
               margin: 0;
               padding: 0;
               display: flex;
               flex-direction: column;
               align-items: center;
               justify-content: center;
               min-height: 100vh;
               color: #333;
               background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.4)),
                           url('https://img.freepik.com/vector-gratis/fondo-garabato-abstracto-dibujado-mano_23-2149333744.jpg?semt=ais_hybrid&w=740');
               background-size: cover;
               background-position: center;
               background-attachment: fixed;
           }

           /* Contenedor principal */
           .login-container {
               background-color: rgba(255, 255, 255, 0.9);
               padding: 2.5rem;
               border-radius: 10px;
               box-shadow: 0 5px 15px rgba(0,0,0,0.1);
               width: 100%;
               max-width: 400px;
               backdrop-filter: blur(3px);
               border: 1px solid rgba(255, 255, 255, 0.3);
           }

           h2 {
               color: #2c3e50;
               text-align: center;
               margin-bottom: 1.5rem;
               font-size: 1.8rem;
           }

           /* Estilos del formulario */
           form {
               display: flex;
               flex-direction: column;
               gap: 1.2rem;
           }

           .form-group {
               display: flex;
               flex-direction: column;
               gap: 0.5rem;
           }

           label {
               font-weight: 500;
               color: #555;
           }

           input {
               padding: 0.8rem;
               border: 1px solid #ddd;
               border-radius: 5px;
               font-size: 1rem;
               transition: all 0.3s ease;
           }

           input:focus {
               outline: none;
               border-color: #3498db;
               box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
           }

           /* Estilo del botón */
           button[type="submit"] {
               background-color: #2ecc71;
               color: white;
               border: none;
               padding: 0.8rem;
               font-size: 1rem;
               font-weight: 500;
               cursor: pointer;
               border-radius: 5px;
               transition: all 0.3s ease;
               margin-top: 0.5rem;
           }

           button[type="submit"]:hover {
               background-color: #27ae60;
               transform: translateY(-2px);
               box-shadow: 0 4px 8px rgba(0,0,0,0.1);
           }

           /* Enlace de volver */
           .back-link {
               text-align: center;
               margin-top: 1.5rem;
           }

           .back-link a {
               color: #3498db;
               text-decoration: none;
               font-weight: 500;
               transition: color 0.3s ease;
           }

           .back-link a:hover {
               color: #2980b9;
               text-decoration: underline;
           }

           /* Responsive */
           @media (max-width: 480px) {
               .login-container {
                   padding: 1.5rem;
                   margin: 0 1rem;
               }

               h2 {
                   font-size: 1.5rem;
               }
           }

    </style>
</head>
<body>
<div class="login-container">
    <h2>Iniciar Sesión - Cliente</h2>

    <form action="/procesar-login" method="post">
        <div class="form-group">
            <label for="correo">Correo electrónico:</label>
            <input type="email" id="correo" name="correo" required placeholder="example@email.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" id="password" name="password" required placeholder="Password">
        </div>
        <div>
            <button type="submit">Ingresar</button>
        </div>
    </form>

    <div class="back-link">
        <p><a th:href="@{/}">Volver al inicio</a></p>  <!-- Cambio clave aquí -->
    </div>
</div>
</body>
</html>
