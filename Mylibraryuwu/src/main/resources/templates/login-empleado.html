<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Empleado</title>
    <style>
        /* Estilos generales */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #333;
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.4)),
                        url('https://i.pinimg.com/736x/26/2c/9e/262c9efdd21603fc14087e205af7255b.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Contenedor principal */
        .login-container {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            backdrop-filter: blur(3px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        /* Estilos del formulario */
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            color: #555;
            margin-bottom: 0.3rem;
        }

        input {
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        /* Estilo del botón */
        button[type="submit"] {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 0.8rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        button[type="submit"]:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Mensajes de error/logout */
        .message {
            text-align: center;
            padding: 0.8rem;
            border-radius: 5px;
            margin-top: 1rem;
            font-weight: 500;
        }

        .error {
            color: #c0392b;
            background-color: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .success {
            color: #27ae60;
            background-color: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        /* Enlace de volver */
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 1.5rem;
                margin: 0 1rem;
            }

            h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>Inicio de Sesión - Empleado</h2>

    <form th:action="@{/login-empleado}" method="post">
        <div class="form-group">
            <label for="username">Usuario:</label>
            <input type="text" name="username" id="username" required placeholder="Ingrese su usuario">
        </div>

        <div class="form-group">
            <label for="password">Contraseña:</label>
            <input type="password" name="password" id="password" required placeholder="Ingrese su contraseña">
        </div>

        <button type="submit">Ingresar</button>
    </form>

    <p class="message error" th:if="${param.error}">Credenciales incorrectas. Intenta de nuevo.</p>
    <p class="message success" th:if="${param.logout}">Has cerrado sesión exitosamente.</p>

    <div class="back-link">
        <a th:href="@{/}">Volver al inicio</a>
    </div>
</div>
</body>
</html>
